<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cursos y Estudiantes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Sistema de Gestión Escolar</h1>
        
        <div class="grid">
            <!-- Sección Estudiantes -->
            <div class="card">
                <h2>Estudiantes</h2>
                <form id="student-form">
                    <input type="text" id="student-name" placeholder="Nombre" required>
                    <input type="email" id="student-email" placeholder="Email" required>
                    <button type="submit">Agregar Estudiante</button>
                </form>
                <ul id="student-list" class="list"></ul>
            </div>

            <!-- Sección Cursos -->
            <div class="card">
                <h2>Cursos</h2>
                <form id="course-form">
                    <input type="text" id="course-name" placeholder="Nombre del curso" required>
                    <input type="text" id="course-desc" placeholder="Descripción">
                    <button type="submit">Agregar Curso</button>
                </form>
                <ul id="course-list" class="list"></ul>
            </div>

            <!-- Sección Inscripciones -->
            <div class="card full-width">
                <h2>Inscripciones</h2>
                <form id="enroll-form" class="inline-form">
                    <select id="enroll-student" required>
                        <option value="">Seleccionar Estudiante</option>
                    </select>
                    <select id="enroll-course" required>
                        <option value="">Seleccionar Curso</option>
                    </select>
                    <button type="submit">Inscribir</button>
                </form>
                <table id="enrollment-table">
                    <thead>
                        <tr>
                            <th>Estudiante</th>
                            <th>Curso</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
