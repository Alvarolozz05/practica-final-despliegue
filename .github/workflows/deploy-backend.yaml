name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Simulación de Tests (descomentar si tienes tests)
      # - name: Run Tests
      #   run: |
      #     docker build -t test-backend ./backend
      #     docker run --rm test-backend ./vendor/bin/phpunit tests/

      - name: Trigger Render Deploy
        if: success()
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
